root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o .\\tmp\\server.exe .\\cmd\\server"
bin = ".\\tmp\\server.exe"
full_bin = ".\\tmp\\server.exe"
include_ext = ["go", "toml", "env"]
exclude_dir = ["tmp", "vendor", ".git"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500
log = "build-errors.log"

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[log]
time = true

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true